server {
    listen 80;
    server_name _;

    root /var/www/annoq-site;
    index index.html;

    location = /docs {
        return 301 /docs/;
    }

    location ^~ /docs/ {
        try_files $uri $uri.html $uri/ /docs/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
