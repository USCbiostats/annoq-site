<header>
  <nav class="js-navbar-scroll navbar navbar-expand-lg noc-navbar">
    <a class="navbar-brand annoq-main-logo" href="/">AnnoQ</a>

    <div class="annoq-query-buttons d-none d-lg-flex">
      <a class="annoq-cta annoq-cta-r" href="/search">LAUNCH QUERY UI</a>
      <a class="annoq-cta annoq-cta-l" href="{{ site.baseurl }}/tutorials/ui-query">UI TUTORIAL</a>
    </div>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#main_navbar"
      aria-controls="main_navbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="main_navbar">
      <ul class="navbar-nav ml-lg-auto">
        {% for link in site.data.navigation %}
        <li class="nav-item">
          <a class="nav-link"
            href="{% if link.url %}{{ site.baseurl }}/{{ link.url }}{% else %}{{ link.external_url }}{% endif %}">{{
            link.title }}</a>
        </li>
        {% endfor %}

        <li class="nav-item d-lg-none mt-2">
          <a class="annoq-cta annoq-cta-r" href="/search">LAUNCH QUERY UI</a>
        </li>
        <li class="nav-item d-lg-none mt-2 mb-2">
          <a class="annoq-cta annoq-cta-l" href="{{ site.baseurl }}/tutorials/ui-query">UI TUTORIAL</a>
        </li>
      </ul>
    </div>
  </nav>
</header>
